<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CORTEX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f0f0f3;
      --border: #d8d8e0;
      --text: #1a1a2e;
      --text2: #6b6b80;
      --accent: #6248d8;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px calc(32px + var(--safe-bottom));
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--accent);
    }
    .tagline {
      color: var(--text2);
      font-size: 12px;
      margin-top: 2px;
    }

    /* ── Capture box ── */
    .capture-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .capture-hint {
      color: var(--text2);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .capture-hint code {
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
      color: #999;
    }
    #capture-box {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 14px;
      resize: none;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    #capture-box:focus { border-color: var(--accent); }
    #capture-box::placeholder { color: var(--text2); }

    .capture-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      gap: 10px;
    }
    .capture-tip {
      color: var(--text2);
      font-size: 12px;
      flex-shrink: 0;
    }
    #capture-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #capture-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #capture-btn:active:not(:disabled) { opacity: 0.75; }

    .capture-status {
      font-size: 12px;
      color: var(--text2);
      min-height: 18px;
      margin-top: 7px;
    }
    .capture-status.error { color: #d94f4f; }
    .capture-status.ok { color: #2e8f57; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .tab:active { opacity: 0.75; }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tab .count {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.72;
    }
    .tab.active .count { opacity: 0.85; }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #d94f4f;
      color: #fff;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      min-width: 18px;
    }

    /* ── Feed ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-group { margin-bottom: 10px; }
    .topic-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
      padding: 6px 4px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .topic-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 10px;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: none; }
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .conf-pip {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .conf-pct {
      font-size: 11px;
      color: var(--text2);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 3px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 11px;
      color: var(--text2);
      padding: 2px 7px;
    }

    .card-time {
      font-size: 11px;
      color: var(--text2);
      margin-top: 5px;
    }

    /* Actions — full width below card body on all screens */
    .card-actions {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 7px;
      padding-left: 46px; /* align with card body (36px icon + 10px gap) */
      flex-wrap: wrap;
    }
    .action-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 36px;
      font-weight: 500;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { opacity: 0.7; }
    .action-btn.open { color: var(--accent); border-color: var(--accent); }
    .action-btn.complete { color: #2a7a50; border-color: #2a7a50; }

    /* Image capture thumbnail */
    .card-thumb {
      width: 56px;
      height: 56px;
      border-radius: 9px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }
    .card.image-capture .card-actions {
      padding-left: 66px; /* 56px thumb + 10px gap */
    }

    /* Unknown / Unsorted */
    .card.unknown {
      border-style: dashed;
      border-color: #d4a017;
    }

    /* Type picker inline */
    .type-picker {
      position: relative;
      display: inline-block;
    }
    .type-picker-dropdown {
      position: absolute;
      bottom: calc(100% + 6px);
      left: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      z-index: 100;
      min-width: 200px;
      max-height: 240px;
      overflow-y: auto;
      padding: 6px;
    }
    .type-picker-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background 0.1s;
    }
    .type-picker-option:hover { background: var(--surface2); }

    /* ── Camera popup ── */
    .camera-popup {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      padding: 6px;
      z-index: 200;
      min-width: 210px;
    }
    .camera-popup-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      transition: background 0.1s;
    }
    .camera-popup-option:hover { background: var(--surface2); }
    .camera-popup-option .option-icon { font-size: 18px; }

    /* Camera stream overlay */
    .camera-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .camera-overlay video,
    .camera-overlay canvas {
      max-width: min(480px, 95vw);
      max-height: 60vh;
      border-radius: 10px;
      object-fit: cover;
    }
    .camera-overlay canvas { display: none; }
    .camera-controls {
      display: flex;
      gap: 12px;
    }
    .cam-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
    }
    .cam-btn.secondary {
      background: rgba(255,255,255,0.15);
    }

    /* Image preview before submit */
    .image-preview-wrap {
      display: none;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding: 8px;
      background: var(--surface2);
      border-radius: 8px;
    }
    .image-preview-wrap img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 6px;
    }
    .image-preview-info { font-size: 12px; color: var(--text2); flex: 1; }
    .image-preview-clear {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      color: var(--text2);
    }

    /* States */
    .empty {
      text-align: center;
      color: var(--text2);
      padding: 56px 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    .loading {
      text-align: center;
      color: var(--text2);
      padding: 32px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">CORTEX</div>
      <div class="tagline">Capture everything. Corty classifies.</div>
    </div>
  </header>

  <!-- Capture box -->
  <div class="capture-wrap">
    <div class="capture-hint">
      Paste a URL, a <code>URL keyword</code>, or any text. Corty handles the rest.
    </div>
    <textarea id="capture-box" placeholder="https://linkedin.com/jobs/123 — or — 'Remind me to call Vikas Thursday 4pm' — or — 'https://substack.com/p/... AI'"></textarea>
    <div class="capture-footer">
      <span class="capture-tip">⌘ + Enter to capture</span>
      <button id="capture-btn">Capture</button>
    </div>
    <div class="image-preview-wrap" id="image-preview-wrap">
      <img id="image-preview-thumb" src="" alt="preview">
      <div class="image-preview-info" id="image-preview-info">Image ready</div>
      <button class="image-preview-clear" id="image-preview-clear" title="Remove image">✕</button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-top:8px;position:relative">
      <div style="position:relative">
        <button id="camera-icon-btn" title="Capture image" style="background:none;border:none;cursor:pointer;font-size:20px;padding:4px;color:var(--text2);line-height:1">📷</button>
        <div class="camera-popup" id="camera-popup" style="display:none">
          <div class="camera-popup-option" id="open-camera-opt">
            <span class="option-icon">📷</span><span>Open Camera</span>
          </div>
          <div class="camera-popup-option" id="open-gallery-opt">
            <span class="option-icon">🖼️</span><span>Upload from Gallery</span>
          </div>
        </div>
      </div>
    </div>
    <div class="capture-status" id="capture-status"></div>
  </div>

  <!-- Hidden file input for gallery -->
  <input type="file" id="gallery-input" accept="image/*" style="display:none">
  <!-- Hidden file input for native camera (HTTP fallback — no getUserMedia needed) -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">

  <!-- Camera stream overlay -->
  <div class="camera-overlay" id="camera-overlay" style="display:none">
    <video id="camera-video" autoplay playsinline></video>
    <canvas id="camera-canvas"></canvas>
    <div class="camera-controls" id="camera-controls-capture">
      <button class="cam-btn secondary" id="cam-cancel">✕ Cancel</button>
      <button class="cam-btn" id="cam-capture">Capture</button>
    </div>
    <div class="camera-controls" id="camera-controls-confirm" style="display:none">
      <button class="cam-btn secondary" id="cam-retake">↩ Retake</button>
      <button class="cam-btn" id="cam-use">Use Photo</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-type="">All</button>
    <button class="tab" data-type="job_application">💼 Jobs</button>
    <button class="tab" data-type="food_for_thought">🍽️ Food for Thought</button>
    <button class="tab" data-type="build_better">🔨 Product Craft</button>
    <button class="tab" data-type="learning">🧠 Learnings</button>
    <button class="tab" data-type="interview_exp">🎯 Interviews</button>
    <button class="tab" data-type="reminder">⏰ Reminders <span class="badge" id="reminder-badge" style="display:none"></span></button>
    <button class="tab" data-type="product_idea">💡 Ideas</button>
    <button class="tab" data-type="general_note">📝 Notes</button>
    <button class="tab" data-type="unknown" id="tab-unknown" style="color:#b86c0e;border-color:#d4a017">? Unsorted <span class="badge" id="unsorted-badge" style="display:none;background:#d4a017"></span></button>
    <!-- Dynamic Corty-created types inserted here by JS -->
  </div>

  <!-- Feed -->
  <div id="feed"><div class="loading">Loading…</div></div>

</div>

<script>
  const $ = id => document.getElementById(id);
  let activeType = '';

  // ── Tab switching ──
  $('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeType = tab.dataset.type;
    loadFeed();
  });

  // ── Capture ──
  $('capture-btn').addEventListener('click', doCapture);
  $('capture-box').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doCapture();
  });

  async function doCapture() {
    if (_pendingImageB64) { await doImageCapture(); return; }

    const text = $('capture-box').value.trim();
    if (!text) return;
    setStatus('Corty is classifying…', '');
    $('capture-btn').disabled = true;

    try {
      const res = await fetch('/api/capture', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text}),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setStatus(err.error || 'Something went wrong', 'error');
        return;
      }

      const result = await res.json();
      $('capture-box').value = '';
      $('capture-box').blur(); // dismiss keyboard on mobile

      const cards = result.cards || [result];
      const count = cards.length;

      if (count === 1) {
        const card = cards[0];
        const topic = card.metadata && card.metadata.topic ? ' · ' + card.metadata.topic : '';
        setStatus(`✓ Captured as ${card.display.label}${topic}`, 'ok');
      } else {
        const summary = cards.map(c => c.display.icon + ' ' + c.display.label).join('  ');
        setStatus(`✓ ${count} items captured: ${summary}`, 'ok');
      }

      cards.forEach(card => {
        if (!activeType || activeType === card.type) prependCard(card);
      });

      refreshCounts();
    } catch(e) {
      setStatus('Network error — try again', 'error');
    } finally {
      $('capture-btn').disabled = false;
    }
  }

  function setStatus(msg, cls) {
    const el = $('capture-status');
    el.textContent = msg;
    el.className = 'capture-status' + (cls ? ' ' + cls : '');
  }

  // ── Feed ──
  async function loadFeed() {
    $('feed').innerHTML = '<div class="loading">Loading…</div>';
    const url = '/api/feed' + (activeType ? '?type=' + activeType : '');
    try {
      const data = await fetch(url).then(r => r.json());
      updateReminderBadgeFrom(data.reminder_badge);
      $('feed').innerHTML = '';
      if (data.grouped) {
        renderGrouped(data.groups);
      } else {
        renderFlat(data.cards);
      }
    } catch(e) {
      $('feed').innerHTML = '<div class="empty">Failed to load.<br>Check your connection and refresh.</div>';
    }
  }

  function renderFlat(cards) {
    if (!cards || !cards.length) {
      $('feed').innerHTML = '<div class="empty">Nothing here yet.<br>Paste something above to get started.</div>';
      return;
    }
    cards.forEach(c => $('feed').appendChild(makeCard(c)));
  }

  function renderGrouped(groups) {
    if (!groups || !groups.length) {
      $('feed').innerHTML = '<div class="empty">Nothing here yet.<br>Paste a URL with a keyword above.</div>';
      return;
    }
    groups.forEach(g => {
      const div = document.createElement('div');
      div.className = 'topic-group';
      div.innerHTML = `<div class="topic-header">${esc(g.topic)} <span style="font-weight:400">(${g.cards.length})</span></div>`;
      const inner = document.createElement('div');
      inner.className = 'topic-cards';
      g.cards.forEach(c => inner.appendChild(makeCard(c)));
      div.appendChild(inner);
      $('feed').appendChild(div);
    });
  }

  function prependCard(card) {
    const feed = $('feed');
    const empty = feed.querySelector('.empty');
    if (empty) empty.remove();
    feed.insertBefore(makeCard(card), feed.firstChild);
  }

  function makeCard(card) {
    const d = card.display;
    const isUnknown = card.type === 'unknown';
    const isImage = card.input_type === 'image';
    const confPct = Math.round((card.confidence || 0) * 100);
    const confColor = confPct >= 85 ? '#2a7a50' : confPct >= 70 ? '#b86c0e' : '#c0392b';

    const el = document.createElement('div');
    el.className = 'card' + (isUnknown ? ' unknown' : '') + (isImage ? ' image-capture' : '');
    el.dataset.id = card.id;

    // Icon — thumbnail for image captures, emoji otherwise
    let iconEl;
    if (isImage) {
      iconEl = document.createElement('img');
      iconEl.className = 'card-thumb';
      iconEl.src = `/api/image/${card.id}`;
      iconEl.alt = d.title;
      iconEl.loading = 'lazy';
    } else {
      iconEl = document.createElement('div');
      iconEl.className = 'card-icon';
      iconEl.style.background = d.color + '22';
      iconEl.textContent = d.icon;
    }

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.innerHTML = `<span class="card-label" style="color:${d.color}">${esc(d.label)}</span>
      <span class="conf-pip" style="background:${confColor}"></span>
      <span class="conf-pct">${confPct}%</span>`;
    body.appendChild(meta);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = d.title;
    body.appendChild(title);

    if (d.subtitle) {
      const sub = document.createElement('div');
      sub.className = 'card-subtitle';
      sub.textContent = d.subtitle;
      body.appendChild(sub);
    }

    if (card.tags && card.tags.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      card.tags.slice(0, 4).forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      body.appendChild(tagsEl);
    }

    const time = document.createElement('div');
    time.className = 'card-time';
    time.textContent = formatTime(card.created_at);
    body.appendChild(time);

    // Actions — rendered below body (full width row)
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    (d.actions || []).forEach(action => {
      if (action === 'assign') {
        const picker = makeTypePicker(card.id, el);
        actions.appendChild(picker);
        return;
      }
      const btn = document.createElement('button');
      btn.className = 'action-btn ' + action;
      if (action === 'open_url') {
        btn.textContent = '↗ Open';
        btn.addEventListener('click', () => {
          const url = card.metadata && card.metadata.url;
          if (url) window.open(url, '_blank');
        });
      } else if (action === 'complete') {
        btn.textContent = '✓ Done';
        btn.addEventListener('click', () => completeCard(card.id, el));
      } else if (action === 'view_image') {
        btn.textContent = '🖼️ View';
        btn.className = 'action-btn open';
        btn.addEventListener('click', () => window.open(`/api/image/${card.id}`, '_blank'));
      } else if (action === 'archive') {
        btn.textContent = '× Archive';
        btn.addEventListener('click', () => archiveCard(card.id, el));
      } else if (action === 'extract_reminder') {
        btn.textContent = '⏰ Extract Reminder';
        btn.addEventListener('click', () => extractReminder(card, el));
      }
      actions.appendChild(btn);
    });

    el.appendChild(iconEl);
    el.appendChild(body);
    if ((d.actions || []).length) el.appendChild(actions);
    return el;
  }

  async function archiveCard(id, el) {
    await fetch(`/api/capture/${id}/archive`, {method: 'POST'});
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.2s';
    setTimeout(() => el.remove(), 200);
    refreshCounts();
  }

  async function completeCard(id, el) {
    const data = await fetch(`/api/capture/${id}/complete`, {method: 'POST'}).then(r => r.json());
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.2s';
    setTimeout(() => el.remove(), 200);
    updateReminderBadgeFrom(data.reminder_badge);
    refreshCounts();
  }

  // ── Type picker (for Unknown cards) ──
  let _allTypes = null;

  async function getAllTypes() {
    if (!_allTypes) {
      _allTypes = await fetch('/api/types').then(r => r.json()).catch(() => []);
    }
    return _allTypes;
  }

  function makeTypePicker(captureId, cardEl) {
    const wrap = document.createElement('div');
    wrap.className = 'type-picker';

    const btn = document.createElement('button');
    btn.className = 'action-btn assign';
    btn.textContent = '→ Assign';

    const dropdown = document.createElement('div');
    dropdown.className = 'type-picker-dropdown';
    dropdown.style.display = 'none';

    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (dropdown.style.display !== 'none') {
        dropdown.style.display = 'none';
        return;
      }
      dropdown.innerHTML = '<div style="padding:8px 10px;font-size:12px;color:#999">Loading…</div>';
      dropdown.style.display = '';
      const types = await getAllTypes();
      dropdown.innerHTML = '';
      types.forEach(t => {
        const opt = document.createElement('div');
        opt.className = 'type-picker-option';
        opt.innerHTML = `<span>${t.icon}</span><span>${esc(t.label)}</span>`;
        opt.addEventListener('click', async () => {
          await assignCard(captureId, t.key, cardEl);
          dropdown.style.display = 'none';
        });
        dropdown.appendChild(opt);
      });
    });

    document.addEventListener('click', () => { dropdown.style.display = 'none'; }, {once: false});

    wrap.appendChild(btn);
    wrap.appendChild(dropdown);
    return wrap;
  }

  async function assignCard(captureId, typeKey, cardEl) {
    try {
      await fetch('/api/unknown/resolve', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: captureId, type: typeKey}),
      });
      cardEl.style.opacity = '0';
      cardEl.style.transition = 'opacity 0.2s';
      setTimeout(() => cardEl.remove(), 200);
      _allTypes = null; // invalidate cache so new types show
      refreshCounts();
    } catch(e) { /* silent */ }
  }

  // ── Dynamic Corty-created type tabs ──
  async function loadDynamicTypes() {
    try {
      const types = await getAllTypes();
      const tabsEl = $('tabs');
      const existingTypes = new Set(
        [...tabsEl.querySelectorAll('.tab[data-type]')].map(t => t.dataset.type)
      );
      types
        .filter(t => !t.is_seed && !existingTypes.has(t.key))
        .forEach(t => {
          const tab = document.createElement('button');
          tab.className = 'tab';
          tab.dataset.type = t.key;
          tab.innerHTML = `${esc(t.icon)} ${esc(t.label)}`;
          // Insert before the Unsorted tab
          const unsortedTab = $('tab-unknown');
          tabsEl.insertBefore(tab, unsortedTab);
        });
    } catch(e) { /* silent */ }
  }

  // ── Tab counts ──
  async function refreshCounts() {
    try {
      const counts = await fetch('/api/counts').then(r => r.json());
      document.querySelectorAll('.tab[data-type]').forEach(tab => {
        const type = tab.dataset.type;
        if (!type) return; // "All" tab
        if (type === 'unknown') return; // handled separately below
        const old = tab.querySelector('.count');
        if (old) old.remove();
        const n = counts[type] || 0;
        if (n > 0) {
          const span = document.createElement('span');
          span.className = 'count';
          span.textContent = n;
          tab.appendChild(span);
        }
      });
      updateReminderBadgeFrom(counts['reminder'] || 0);
      updateUnsortedBadgeFrom(counts['unknown'] || 0);
    } catch(e) { /* silent */ }
  }

  async function updateReminderBadge() {
    const data = await fetch('/api/badge').then(r => r.json()).catch(() => ({}));
    updateReminderBadgeFrom(data.reminder_badge || 0);
  }

  function updateReminderBadgeFrom(n) {
    const badge = $('reminder-badge');
    if (n > 0) {
      badge.textContent = n;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  function updateUnsortedBadgeFrom(n) {
    const badge = $('unsorted-badge');
    if (n > 0) {
      badge.textContent = n;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Extract reminder action ──
  async function extractReminder(card, cardEl) {
    const structured = (card.metadata && card.metadata.structured_data) || {};
    const dueDate = structured.due_date;
    if (!dueDate) return;
    const description = (card.metadata && card.metadata.description) || '';
    await fetch('/api/capture', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        text: `Reminder: ${description} — due ${dueDate}`,
      }),
    });
    // Remove extract_reminder button from card
    cardEl.querySelectorAll('.action-btn.extract_reminder').forEach(b => b.remove());
    setStatus('✓ Reminder created', 'ok');
  }

  // ── Camera / image capture ──
  let _pendingImageB64 = null;
  let _cameraStream = null;

  const _cameraIconBtn = $('camera-icon-btn');
  const _cameraPopup   = $('camera-popup');

  _cameraIconBtn.addEventListener('click', e => {
    e.stopPropagation();
    _cameraPopup.style.display = _cameraPopup.style.display === 'none' ? '' : 'none';
  });
  document.addEventListener('click', () => { _cameraPopup.style.display = 'none'; });

  $('open-gallery-opt').addEventListener('click', () => {
    _cameraPopup.style.display = 'none';
    $('gallery-input').click();
  });

  $('gallery-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const dataUrl = evt.target.result;
      // dataUrl = "data:image/jpeg;base64,..."
      const [header, b64] = dataUrl.split(',');
      const mediaType = header.replace('data:', '').replace(';base64', '');
      _pendingImageB64 = {b64, mediaType};
      showImagePreview(dataUrl, file.name);
    };
    reader.readAsDataURL(file);
    e.target.value = ''; // reset so same file can be re-selected
  });

  $('open-camera-opt').addEventListener('click', async () => {
    _cameraPopup.style.display = 'none';
    // getUserMedia requires HTTPS — fall back to native camera input on HTTP
    if (window.isSecureContext && navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      await openCamera();
    } else {
      $('camera-input').click();
    }
  });

  $('camera-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      const dataUrl = evt.target.result;
      const [header, b64] = dataUrl.split(',');
      const mediaType = header.replace('data:', '').replace(';base64', '');
      _pendingImageB64 = {b64, mediaType};
      showImagePreview(dataUrl, file.name);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  async function openCamera() {
    try {
      _cameraStream = await navigator.mediaDevices.getUserMedia({
        video: {facingMode: {ideal: 'environment'}},
      });
    } catch(err) {
      setStatus('Camera access denied — use Gallery instead', 'error');
      return;
    }
    const video = $('camera-video');
    const canvas = $('camera-canvas');
    video.srcObject = _cameraStream;
    video.style.display = '';
    canvas.style.display = 'none';
    $('camera-controls-capture').style.display = '';
    $('camera-controls-confirm').style.display = 'none';
    $('camera-overlay').style.display = '';
  }

  $('cam-cancel').addEventListener('click', closeCamera);

  $('cam-capture').addEventListener('click', () => {
    const video = $('camera-video');
    const canvas = $('camera-canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    video.style.display = 'none';
    canvas.style.display = '';
    $('camera-controls-capture').style.display = 'none';
    $('camera-controls-confirm').style.display = '';
  });

  $('cam-retake').addEventListener('click', () => {
    const video = $('camera-video');
    const canvas = $('camera-canvas');
    video.style.display = '';
    canvas.style.display = 'none';
    $('camera-controls-capture').style.display = '';
    $('camera-controls-confirm').style.display = 'none';
  });

  $('cam-use').addEventListener('click', () => {
    const canvas = $('camera-canvas');
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    const b64 = dataUrl.split(',')[1];
    _pendingImageB64 = {b64, mediaType: 'image/jpeg'};
    closeCamera();
    showImagePreview(dataUrl, 'camera photo');
  });

  function closeCamera() {
    $('camera-overlay').style.display = 'none';
    if (_cameraStream) {
      _cameraStream.getTracks().forEach(t => t.stop());
      _cameraStream = null;
    }
    $('camera-video').srcObject = null;
  }

  function showImagePreview(dataUrl, name) {
    $('image-preview-thumb').src = dataUrl;
    $('image-preview-info').textContent = name;
    $('image-preview-wrap').style.display = 'flex';
  }

  function clearImagePreview() {
    _pendingImageB64 = null;
    $('image-preview-thumb').src = '';
    $('image-preview-wrap').style.display = 'none';
  }

  $('image-preview-clear').addEventListener('click', clearImagePreview);

  async function doImageCapture() {
    setStatus('Corty is analyzing image…', '');
    $('capture-btn').disabled = true;

    const hint = $('capture-box').value.trim();
    const {b64, mediaType} = _pendingImageB64;

    try {
      const res = await fetch('/api/capture/image', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image: b64, media_type: mediaType, hint}),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setStatus(err.error || 'Image capture failed', 'error');
        return;
      }

      const card = await res.json();
      $('capture-box').value = '';
      $('capture-box').blur();
      clearImagePreview();

      const topic = card.metadata && card.metadata.topic ? ' · ' + card.metadata.topic : '';
      setStatus(`✓ Image captured as ${card.display.label}${topic}`, 'ok');

      if (!activeType || activeType === card.type) prependCard(card);
      refreshCounts();
    } catch(e) {
      setStatus('Network error — try again', 'error');
    } finally {
      $('capture-btn').disabled = false;
    }
  }

  // ── Init ──
  loadFeed();
  refreshCounts();
  loadDynamicTypes();
  setInterval(refreshCounts, 60000);
  setInterval(loadDynamicTypes, 300000); // refresh dynamic tabs every 5 min
</script>
</body>
</html>
