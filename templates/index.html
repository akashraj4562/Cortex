<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CORTEX</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface2: #f0f0f3;
      --border: #d8d8e0;
      --text: #1a1a2e;
      --text2: #6b6b80;
      --accent: #6248d8;
      --radius: 12px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Layout ── */
    .app {
      max-width: 720px;
      margin: 0 auto;
      padding: 16px 14px calc(32px + var(--safe-bottom));
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 3px;
      color: var(--accent);
    }
    .tagline {
      color: var(--text2);
      font-size: 12px;
      margin-top: 2px;
    }

    /* ── Capture box ── */
    .capture-wrap {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 16px;
    }
    .capture-hint {
      color: var(--text2);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .capture-hint code {
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
      color: #999;
    }
    #capture-box {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 12px 14px;
      resize: none;
      min-height: 90px;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    #capture-box:focus { border-color: var(--accent); }
    #capture-box::placeholder { color: var(--text2); }

    .capture-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      gap: 10px;
    }
    .capture-tip {
      color: var(--text2);
      font-size: 12px;
      flex-shrink: 0;
    }
    #capture-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #capture-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #capture-btn:active:not(:disabled) { opacity: 0.75; }

    .capture-status {
      font-size: 12px;
      color: var(--text2);
      min-height: 18px;
      margin-top: 7px;
    }
    .capture-status.error { color: #d94f4f; }
    .capture-status.ok { color: #2e8f57; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      min-height: 36px;
      display: flex;
      align-items: center;
      gap: 5px;
      -webkit-tap-highlight-color: transparent;
    }
    .tab:active { opacity: 0.75; }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .tab .count {
      font-size: 11px;
      font-weight: 700;
      opacity: 0.72;
    }
    .tab.active .count { opacity: 0.85; }
    .tab .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #d94f4f;
      color: #fff;
      border-radius: 9px;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      min-width: 18px;
    }

    /* ── Feed ── */
    #feed {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .topic-group { margin-bottom: 10px; }
    .topic-header {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text2);
      padding: 6px 4px;
      margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .topic-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 10px;
      animation: fadeIn 0.18s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to   { opacity: 1; transform: none; }
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      min-width: 0;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .conf-pip {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }
    .conf-pct {
      font-size: 11px;
      color: var(--text2);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      margin-bottom: 3px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--text2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      font-size: 11px;
      color: var(--text2);
      padding: 2px 7px;
    }

    .card-time {
      font-size: 11px;
      color: var(--text2);
      margin-top: 5px;
    }

    /* Actions — full width below card body on all screens */
    .card-actions {
      width: 100%;
      display: flex;
      flex-direction: row;
      gap: 7px;
      padding-left: 46px; /* align with card body (36px icon + 10px gap) */
      flex-wrap: wrap;
    }
    .action-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 36px;
      font-weight: 500;
      transition: background 0.12s, color 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn:active { opacity: 0.7; }
    .action-btn.open { color: var(--accent); border-color: var(--accent); }
    .action-btn.complete { color: #2a7a50; border-color: #2a7a50; }

    /* Unclassified */
    .card.unclassified {
      border-style: dashed;
      border-color: #c0c0cc;
    }

    /* States */
    .empty {
      text-align: center;
      color: var(--text2);
      padding: 56px 20px;
      font-size: 14px;
      line-height: 1.6;
    }
    .loading {
      text-align: center;
      color: var(--text2);
      padding: 32px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div>
      <div class="logo">CORTEX</div>
      <div class="tagline">Capture everything. Corty classifies.</div>
    </div>
  </header>

  <!-- Capture box -->
  <div class="capture-wrap">
    <div class="capture-hint">
      Paste a URL, a <code>URL keyword</code>, or any text. Corty handles the rest.
    </div>
    <textarea id="capture-box" placeholder="https://linkedin.com/jobs/123 — or — 'Remind me to call Vikas Thursday 4pm' — or — 'https://substack.com/p/... AI'"></textarea>
    <div class="capture-footer">
      <span class="capture-tip">⌘ + Enter to capture</span>
      <button id="capture-btn">Capture</button>
    </div>
    <div class="capture-status" id="capture-status"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-type="">All</button>
    <button class="tab" data-type="job_application">💼 Jobs</button>
    <button class="tab" data-type="food_for_thought">🍽️ Food for Thought</button>
    <button class="tab" data-type="build_better">🔨 Product Craft</button>
    <button class="tab" data-type="learning">🧠 Learnings</button>
    <button class="tab" data-type="interview_exp">🎯 Interviews</button>
    <button class="tab" data-type="reminder">⏰ Reminders <span class="badge" id="reminder-badge" style="display:none"></span></button>
    <button class="tab" data-type="product_idea">💡 Ideas</button>
    <button class="tab" data-type="general_note">📝 Notes</button>
  </div>

  <!-- Feed -->
  <div id="feed"><div class="loading">Loading…</div></div>

</div>

<script>
  const $ = id => document.getElementById(id);
  let activeType = '';

  // ── Tab switching ──
  $('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeType = tab.dataset.type;
    loadFeed();
  });

  // ── Capture ──
  $('capture-btn').addEventListener('click', doCapture);
  $('capture-box').addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') doCapture();
  });

  async function doCapture() {
    const text = $('capture-box').value.trim();
    if (!text) return;
    setStatus('Corty is classifying…', '');
    $('capture-btn').disabled = true;

    try {
      const res = await fetch('/api/capture', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text}),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        setStatus(err.error || 'Something went wrong', 'error');
        return;
      }

      const result = await res.json();
      $('capture-box').value = '';
      $('capture-box').blur(); // dismiss keyboard on mobile

      const cards = result.cards || [result];
      const count = cards.length;

      if (count === 1) {
        const card = cards[0];
        const topic = card.metadata && card.metadata.topic ? ' · ' + card.metadata.topic : '';
        setStatus(`✓ Captured as ${card.display.label}${topic}`, 'ok');
      } else {
        const summary = cards.map(c => c.display.icon + ' ' + c.display.label).join('  ');
        setStatus(`✓ ${count} items captured: ${summary}`, 'ok');
      }

      cards.forEach(card => {
        if (!activeType || activeType === card.type) prependCard(card);
      });

      refreshCounts();
    } catch(e) {
      setStatus('Network error — try again', 'error');
    } finally {
      $('capture-btn').disabled = false;
    }
  }

  function setStatus(msg, cls) {
    const el = $('capture-status');
    el.textContent = msg;
    el.className = 'capture-status' + (cls ? ' ' + cls : '');
  }

  // ── Feed ──
  async function loadFeed() {
    $('feed').innerHTML = '<div class="loading">Loading…</div>';
    const url = '/api/feed' + (activeType ? '?type=' + activeType : '');
    try {
      const data = await fetch(url).then(r => r.json());
      updateReminderBadgeFrom(data.reminder_badge);
      $('feed').innerHTML = '';
      if (data.grouped) {
        renderGrouped(data.groups);
      } else {
        renderFlat(data.cards);
      }
    } catch(e) {
      $('feed').innerHTML = '<div class="empty">Failed to load.<br>Check your connection and refresh.</div>';
    }
  }

  function renderFlat(cards) {
    if (!cards || !cards.length) {
      $('feed').innerHTML = '<div class="empty">Nothing here yet.<br>Paste something above to get started.</div>';
      return;
    }
    cards.forEach(c => $('feed').appendChild(makeCard(c)));
  }

  function renderGrouped(groups) {
    if (!groups || !groups.length) {
      $('feed').innerHTML = '<div class="empty">Nothing here yet.<br>Paste a URL with a keyword above.</div>';
      return;
    }
    groups.forEach(g => {
      const div = document.createElement('div');
      div.className = 'topic-group';
      div.innerHTML = `<div class="topic-header">${esc(g.topic)} <span style="font-weight:400">(${g.cards.length})</span></div>`;
      const inner = document.createElement('div');
      inner.className = 'topic-cards';
      g.cards.forEach(c => inner.appendChild(makeCard(c)));
      div.appendChild(inner);
      $('feed').appendChild(div);
    });
  }

  function prependCard(card) {
    const feed = $('feed');
    const empty = feed.querySelector('.empty');
    if (empty) empty.remove();
    feed.insertBefore(makeCard(card), feed.firstChild);
  }

  function makeCard(card) {
    const d = card.display;
    const isUnclassified = card.type === 'unclassified';
    const confPct = Math.round((card.confidence || 0) * 100);
    const confColor = confPct >= 85 ? '#2a7a50' : confPct >= 70 ? '#b86c0e' : '#c0392b';

    const el = document.createElement('div');
    el.className = 'card' + (isUnclassified ? ' unclassified' : '');
    el.dataset.id = card.id;

    // Icon
    const iconEl = document.createElement('div');
    iconEl.className = 'card-icon';
    iconEl.style.background = d.color + '22';
    iconEl.textContent = d.icon;

    // Body
    const body = document.createElement('div');
    body.className = 'card-body';

    const meta = document.createElement('div');
    meta.className = 'card-meta';
    meta.innerHTML = `<span class="card-label" style="color:${d.color}">${esc(d.label)}</span>
      <span class="conf-pip" style="background:${confColor}"></span>
      <span class="conf-pct">${confPct}%</span>`;
    body.appendChild(meta);

    const title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = d.title;
    body.appendChild(title);

    if (d.subtitle) {
      const sub = document.createElement('div');
      sub.className = 'card-subtitle';
      sub.textContent = d.subtitle;
      body.appendChild(sub);
    }

    if (card.tags && card.tags.length) {
      const tagsEl = document.createElement('div');
      tagsEl.className = 'card-tags';
      card.tags.slice(0, 4).forEach(t => {
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = t;
        tagsEl.appendChild(span);
      });
      body.appendChild(tagsEl);
    }

    const time = document.createElement('div');
    time.className = 'card-time';
    time.textContent = formatTime(card.created_at);
    body.appendChild(time);

    // Actions — rendered below body (full width row)
    const actions = document.createElement('div');
    actions.className = 'card-actions';
    (d.actions || []).forEach(action => {
      const btn = document.createElement('button');
      btn.className = 'action-btn ' + action;
      if (action === 'open_url') {
        btn.textContent = '↗ Open';
        btn.addEventListener('click', () => {
          const url = card.metadata && card.metadata.url;
          if (url) window.open(url, '_blank');
        });
      } else if (action === 'complete') {
        btn.textContent = '✓ Done';
        btn.addEventListener('click', () => completeCard(card.id, el));
      } else if (action === 'archive') {
        btn.textContent = '× Archive';
        btn.addEventListener('click', () => archiveCard(card.id, el));
      }
      actions.appendChild(btn);
    });

    el.appendChild(iconEl);
    el.appendChild(body);
    if ((d.actions || []).length) el.appendChild(actions);
    return el;
  }

  async function archiveCard(id, el) {
    await fetch(`/api/capture/${id}/archive`, {method: 'POST'});
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.2s';
    setTimeout(() => el.remove(), 200);
    refreshCounts();
  }

  async function completeCard(id, el) {
    const data = await fetch(`/api/capture/${id}/complete`, {method: 'POST'}).then(r => r.json());
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.2s';
    setTimeout(() => el.remove(), 200);
    updateReminderBadgeFrom(data.reminder_badge);
    refreshCounts();
  }

  // ── Tab counts ──
  async function refreshCounts() {
    try {
      const counts = await fetch('/api/counts').then(r => r.json());
      document.querySelectorAll('.tab[data-type]').forEach(tab => {
        const type = tab.dataset.type;
        if (!type) return; // "All" tab
        // Remove old count span if exists
        const old = tab.querySelector('.count');
        if (old) old.remove();
        const n = counts[type] || 0;
        if (n > 0) {
          const span = document.createElement('span');
          span.className = 'count';
          span.textContent = n;
          tab.appendChild(span);
        }
      });
      updateReminderBadgeFrom(counts['reminder'] || 0);
    } catch(e) { /* silent */ }
  }

  async function updateReminderBadge() {
    const data = await fetch('/api/badge').then(r => r.json()).catch(() => ({}));
    updateReminderBadgeFrom(data.reminder_badge || 0);
  }

  function updateReminderBadgeFrom(n) {
    const badge = $('reminder-badge');
    if (n > 0) {
      badge.textContent = n;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    const now = new Date();
    const diff = Math.floor((now - d) / 1000);
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Init ──
  loadFeed();
  refreshCounts();
  setInterval(refreshCounts, 60000);
</script>
</body>
</html>
